context: |
  starglyph: synthetic star-sky images and sky-region recognition.
  Prototype stack: starglyph-core (detect/solve/overlay/eval), starglyph-serve (HTTP API),
  simulator-core (dataset v1), solver-core (legacy phase-2 crate — superseded by starglyph-core).
  Strategic backlog lives in the private starglyph/planning repo; OpenSpec here tracks
  engine capabilities and requirements aligned with prototype/crates/starglyph-*.
  Human-oriented docs live in docs/ when present; agent notes in AGENTS.md.

